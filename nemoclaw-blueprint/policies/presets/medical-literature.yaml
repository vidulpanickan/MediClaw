preset:
  name: medical-literature
  description: "Google Scholar and Cochrane Library for literature search"

network_policies:
  medical_literature:
    name: medical_literature
    endpoints:
      - host: scholar.google.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
      - host: www.cochranelibrary.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
    binaries:
      - { path: /usr/local/bin/node }
      - { path: /usr/local/bin/python3 }
